<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON SNAKE // 198X</title>
  <!-- Google Fonts for Retro Arcade Vibe -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: #0b0114;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* Synthwave 3D Perspective Grid Background */
    .synthwave-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #0d0211 0%, #1c0024 40%, #0d0124 100%);
      z-index: 1;
      overflow: hidden;
    }

    /* Glowing Retro Neon Sun */
    .neon-sun {
      position: absolute;
      bottom: 45%;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe600 10%, #ff007f 60%, transparent 100%);
      box-shadow: 0 0 80px rgba(255, 0, 127, 0.6), 0 0 150px rgba(255, 230, 0, 0.4);
      z-index: 2;
    }

    /* Sun Horizontal Stripes (Retro Scanline effect on Sun) */
    .neon-sun::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 12px,
        #0d0211 12px,
        #0d0211 18px
      );
      border-radius: 50%;
      opacity: 0.9;
    }

    /* Perspective Grid Floor */
    .grid-floor {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 50%;
      background-image: 
        linear-gradient(rgba(255, 0, 127, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 127, 0.15) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: center bottom;
      transform: perspective(300px) rotateX(75deg);
      transform-origin: top center;
      z-index: 2;
      animation: grid-scroll 4s linear infinite;
    }

    @keyframes grid-scroll {
      from {
        background-position: 0 0;
      }
      to {
        background-position: 0 100%;
      }
    }

    /* Mountain Silhouette Background */
    .mountains {
      position: absolute;
      bottom: 48%;
      width: 100%;
      height: 100px;
      background: repeating-linear-gradient(
        45deg,
        #140224 0px,
        #140224 20px,
        #29013c 20px,
        #29013c 40px
      );
      clip-path: polygon(0% 100%, 15% 30%, 30% 70%, 45% 15%, 60% 60%, 75% 20%, 90% 75%, 100% 100%);
      opacity: 0.4;
      z-index: 2;
    }

    /* Starfield Sparkles */
    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
      background-size: 200px 200px;
      opacity: 0.3;
      z-index: 1;
    }

    /* Main Container (Arcade Cabinet Style) */
    .arcade-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 750px;
      padding: 20px;
    }

    /* Cabinet Header HUD */
    .hud-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(13, 2, 17, 0.85);
      border: 3px solid #bd00ff;
      box-shadow: 0 0 15px rgba(189, 0, 255, 0.4);
      padding: 12px 24px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .hud-score-container {
      display: flex;
      gap: 30px;
    }

    .hud-label {
      color: #00ffff;
      margin-bottom: 5px;
      text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
    }

    .hud-value {
      color: #ff007f;
      text-shadow: 0 0 5px rgba(255, 0, 127, 0.5);
    }

    /* Mute button styling */
    .audio-btn {
      background: none;
      border: 2px solid #00ffff;
      color: #00ffff;
      padding: 6px 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
    }

    .audio-btn:hover {
      background: #00ffff;
      color: #0d0211;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
    }

    .audio-btn.muted {
      border-color: #ff007f;
      color: #ff007f;
      box-shadow: 0 0 8px rgba(255, 0, 127, 0.2);
    }

    .audio-btn.muted:hover {
      background: #ff007f;
      color: #0d0211;
      box-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
    }

    /* Retro CRT Screen Frame */
    .screen-bezel {
      position: relative;
      background: #151515;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 
        inset 0 0 20px rgba(0,0,0,1),
        0 10px 30px rgba(0,0,0,0.8),
        0 0 0 4px #2b2b2b,
        0 0 25px rgba(189, 0, 255, 0.3);
      border: 2px solid #333;
    }

    /* Screen inner curvature clip */
    .screen-body {
      position: relative;
      width: 600px;
      height: 600px;
      background: #0d0211;
      overflow: hidden;
      border-radius: 8px;
      border: 4px solid #1a1a1a;
      box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
    }

    /* Canvas Element */
    canvas {
      display: block;
      background-color: transparent;
    }

    /* CRT Scanline & Glitch Overlays */
    .crt-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.04),
        rgba(255, 255, 255, 0.04) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* Vignette and phosphor glow */
    .screen-vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: inset 0 0 60px rgba(189, 0, 255, 0.35);
      background: radial-gradient(circle, transparent 70%, rgba(0, 0, 0, 0.45) 100%);
      pointer-events: none;
      z-index: 6;
      animation: screen-flicker 0.15s infinite;
    }

    @keyframes screen-flicker {
      0% { opacity: 0.97; }
      50% { opacity: 1.0; }
      100% { opacity: 0.98; }
    }

    /* Modal Overlay screens (Start and Game Over screens) */
    .screen-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(13, 2, 17, 0.9);
      z-index: 4;
      text-align: center;
      padding: 40px;
      transition: opacity 0.3s ease;
    }

    .screen-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Glowing Titles */
    .title-glowing {
      font-family: 'Press Start 2P', monospace;
      font-size: 38px;
      color: #00ffff;
      text-shadow: 
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #bd00ff;
      margin-bottom: 20px;
      letter-spacing: -2px;
      line-height: 1.4;
      animation: title-pulse 2s infinite alternate;
    }

    @keyframes title-pulse {
      from {
        text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #bd00ff;
        transform: scale(0.98);
      }
      to {
        text-shadow: 0 0 15px #00ffff, 0 0 35px #ff007f, 0 0 60px #bd00ff;
        transform: scale(1.02);
      }
    }

    .game-over-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 40px;
      color: #ff007f;
      text-shadow: 
        0 0 10px #ff007f,
        0 0 20px #ff007f,
        0 0 40px #9e0030;
      margin-bottom: 20px;
      animation: glitch-flicker 1.5s infinite;
    }

    @keyframes glitch-flicker {
      0%, 100% { opacity: 1; transform: skew(0deg); }
      10% { opacity: 0.8; transform: skew(1deg); }
      11% { opacity: 1; transform: skew(-1deg); }
      30% { opacity: 1; }
      31% { opacity: 0.5; transform: skew(3deg); }
      32% { opacity: 1; transform: skew(0deg); }
      78% { opacity: 0.9; }
      79% { opacity: 0.2; }
      80% { opacity: 1; }
    }

    /* Subtitles and instructions */
    .game-info-text {
      font-size: 14px;
      color: #bd00ff;
      margin-bottom: 30px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(189, 0, 255, 0.4);
    }

    /* Controls Tutorial */
    .controls-guide {
      background: rgba(0, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 8px;
      padding: 12px 24px;
      margin-bottom: 25px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      color: #b3b3b3;
      font-size: 10px;
    }

    .control-row {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .control-key {
      background: #2b1b3c;
      border: 2px solid #bd00ff;
      border-radius: 4px;
      padding: 3px 6px;
      font-family: 'Press Start 2P', monospace;
      color: #ff007f;
      font-size: 8px;
      box-shadow: 0 0 8px rgba(189, 0, 255, 0.3);
    }

    /* Food Legend */
    .food-legend {
      display: flex;
      gap: 15px;
      margin-bottom: 35px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }

    /* 80s Cyberpunk Buttons */
    .btn-retro {
      position: relative;
      background: linear-gradient(135deg, #ff007f 0%, #bd00ff 100%);
      color: #ffffff;
      border: none;
      padding: 18px 36px;
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 6px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
      box-shadow: 
        0 4px #7a0053,
        0 0 20px rgba(255, 0, 127, 0.5);
      transition: all 0.1s ease;
      z-index: 10;
    }

    .btn-retro:hover {
      box-shadow: 
        0 4px #7a0053,
        0 0 30px rgba(255, 0, 127, 0.8),
        0 0 15px rgba(0, 255, 255, 0.5);
      transform: translateY(-2px);
    }

    .btn-retro:active {
      transform: translateY(2px);
      box-shadow: 
        0 1px #7a0053,
        0 0 15px rgba(255, 0, 127, 0.5);
    }

    /* Score stats in Gameover modal */
    .stat-box {
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #bd00ff;
      border-radius: 8px;
      padding: 20px 40px;
      margin-bottom: 40px;
      min-width: 300px;
      box-shadow: inset 0 0 15px rgba(189,0,255,0.2);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
    }

    .stat-row:last-child {
      margin-bottom: 0;
    }

    .stat-label {
      color: #00ffff;
    }

    .stat-value {
      color: #ff007f;
      text-shadow: 0 0 8px rgba(255,0,127,0.6);
    }

    /* Footer instruction */
    .footer-credit {
      margin-top: 25px;
      font-size: 10px;
      color: #5d427a;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Retro Synthwave Perspective Grid Background -->
  <div class="synthwave-background">
    <div class="stars"></div>
    <div class="neon-sun"></div>
    <div class="mountains"></div>
    <div class="grid-floor"></div>
  </div>

  <!-- Main Arcade Cabinet Box -->
  <div class="arcade-container">
    
    <!-- Top HUD Bar -->
    <div class="hud-bar">
      <div class="hud-score-container">
        <div>
          <span class="hud-label">SCORE:</span>
          <span id="scoreVal" class="hud-value">0000</span>
        </div>
        <div>
          <span class="hud-label">HI-SCORE:</span>
          <span id="highScoreVal" class="hud-value">0000</span>
        </div>
      </div>
      <div>
        <button id="audioToggle" class="audio-btn">MUSIC: ON</button>
      </div>
    </div>

    <!-- Retro CRT Curved Bezel Outer Frame -->
    <div class="screen-bezel">
      
      <!-- Inner Screen Housing -->
      <div class="screen-body">
        
        <!-- CRT Effects Overlays -->
        <div class="crt-overlay"></div>
        <div class="screen-vignette"></div>

        <!-- 1. Start Screen Menu -->
        <div id="startScreen" class="screen-overlay">
          <h1 class="title-glowing">NEON SNAKE<br>198X</h1>
          <p class="game-info-text">Cybernetic Serpent Simulator</p>
          
          <div class="controls-guide">
            <div class="control-row">
              <span class="control-key">W</span> / <span class="control-key">↑</span>
              <span class="control-key">S</span> / <span class="control-key">↓</span>
              <span>STEER VERTICAL</span>
            </div>
            <div class="control-row">
              <span class="control-key">A</span> / <span class="control-key">←</span>
              <span class="control-key">D</span> / <span class="control-key">→</span>
              <span>STEER HORIZONTAL</span>
            </div>
          </div>

          <div class="food-legend">
            <div class="legend-item" style="color: #00ffff;">
              <span class="dot" style="background-color: #00ffff;"></span>
              <span>COMMON (+100)</span>
            </div>
            <div class="legend-item" style="color: #ffe600;">
              <span class="dot" style="background-color: #ffe600;"></span>
              <span>RARE (+250)</span>
            </div>
            <div class="legend-item" style="color: #ff007f;">
              <span class="dot" style="background-color: #ff007f;"></span>
              <span>EXCLUSIVE (+500)</span>
            </div>
          </div>

          <button id="startBtn" class="btn-retro">START GAME</button>
          <div class="footer-credit">INSERT COIN TO INITIALIZE</div>
        </div>

        <!-- 2. Game Over Screen Menu -->
        <div id="gameOverScreen" class="screen-overlay hidden">
          <h1 class="game-over-title">SYSTEM ERROR</h1>
          <p class="game-info-text">Serpent Disintegrated</p>
          
          <div class="stat-box">
            <div class="stat-row">
              <span class="stat-label">FINAL SCORE:</span>
              <span id="finalScoreVal" class="stat-value">0000</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">BEST ATTEMPT:</span>
              <span id="bestAttemptVal" class="stat-value">0000</span>
            </div>
          </div>

          <button id="restartBtn" class="btn-retro">PLAY AGAIN</button>
          <div class="footer-credit">CONTINUES: 99</div>
        </div>

        <!-- HTML5 Canvas for the Game -->
        <canvas id="gameCanvas" width="600" height="600"></canvas>

      </div>
    </div>
  </div>

  <!-- Audio and Game Logic Script -->
  <script>
    // --- WEB AUDIO API PROCEDURAL AUDIO SYSTEM ---
    class SynthManager {
      constructor() {
        this.ctx = null;
        this.masterVolume = null;
        this.isMuted = false;
        
        // Sequencer variables
        this.schedulerTimerId = null;
        this.nextNoteTime = 0.0;
        this.currentStep = 0;      // 0-15
        this.globalStep = 0;       // 0-63 (For melody loop synchronization)
        this.tempo = 126;          // Driving BPM
        this.lookahead = 25.0;     // Milliseconds
        this.scheduleAheadTime = 0.1; // Seconds
        
        // Music state
        this.isPlayingMusic = false;
      }

      init() {
        if (this.ctx) return;
        
        // Create audio context
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContextClass();
        
        // Setup Master Gain Node for Volume & Mute control
        this.masterVolume = this.ctx.createGain();
        this.masterVolume.gain.setValueAtTime(0.3, this.ctx.currentTime); // Comfortable starting volume
        this.masterVolume.connect(this.ctx.destination);
      }

      setMute(mute) {
        this.isMuted = mute;
        if (!this.ctx) return;
        
        const targetVolume = mute ? 0.0 : 0.3;
        this.masterVolume.gain.linearRampToValueAtTime(targetVolume, this.ctx.currentTime + 0.1);
      }

      startMusic() {
        this.init();
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
        
        if (this.isPlayingMusic) return;
        this.isPlayingMusic = true;
        this.nextNoteTime = this.ctx.currentTime;
        this.currentStep = 0;
        this.globalStep = 0;
        this.scheduler();
      }

      stopMusic() {
        this.isPlayingMusic = false;
        if (this.schedulerTimerId) {
          clearTimeout(this.schedulerTimerId);
        }
      }

      // --- PROCEDURAL SYNTH SOUNDS ---

      // 1. Synth Kick Drum (Syncopated Bass Kick)
      playKick(time) {
        if (!this.ctx || this.isMuted) return;

        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.connect(gain);
        gain.connect(this.masterVolume);
        
        osc.frequency.setValueAtTime(140, time);
        // Exponential sweep from 140Hz down to 40Hz for heavy retro sub punch
        osc.frequency.exponentialRampToValueAtTime(40, time + 0.12);
        
        gain.gain.setValueAtTime(1.0, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.16);
        
        osc.start(time);
        osc.stop(time + 0.18);
      }

      // 2. Synth Snare Drum (White Noise through Bandpass Filter)
      playSnare(time) {
        if (!this.ctx || this.isMuted) return;

        // Generate white noise buffer
        const bufferSize = this.ctx.sampleRate * 0.15;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }

        const noiseNode = this.ctx.createBufferSource();
        noiseNode.buffer = buffer;

        // Filter to shape noise
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1100;
        filter.Q.value = 2.0;

        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.45, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.14);

        noiseNode.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterVolume);

        // Sub-snare pop node
        const pop = this.ctx.createOscillator();
        const popGain = this.ctx.createGain();
        pop.type = 'triangle';
        pop.frequency.setValueAtTime(170, time);
        popGain.gain.setValueAtTime(0.4, time);
        popGain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
        
        pop.connect(popGain);
        popGain.connect(this.masterVolume);

        noiseNode.start(time);
        noiseNode.stop(time + 0.14);
        pop.start(time);
        pop.stop(time + 0.09);
      }

      // 3. Hi-Hat Ticks (High-frequency white noise ticks for off-beat speed driving)
      playHihat(time) {
        if (!this.ctx || this.isMuted) return;

        const bufferSize = this.ctx.sampleRate * 0.04;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }

        const noiseNode = this.ctx.createBufferSource();
        noiseNode.buffer = buffer;

        const filter = this.ctx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = 8500;

        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.12, time); // Subtle sharp tick
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.035);

        noiseNode.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterVolume);

        noiseNode.start(time);
        noiseNode.stop(time + 0.04);
      }

      // 4. Driving Bassline (Galloping / Moroder Bass)
      playBass(freq, time, duration) {
        if (!this.ctx || this.isMuted) return;

        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        const filter = this.ctx.createBiquadFilter();

        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(freq, time);
        
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(freq / 2, time); // Sub-bass octave lower

        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(260, time);
        filter.frequency.exponentialRampToValueAtTime(1100, time + 0.05); // Rapid filter envelope sweep
        filter.frequency.exponentialRampToValueAtTime(150, time + duration);

        gain.gain.setValueAtTime(0.75, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + duration);

        osc1.connect(filter);
        osc2.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterVolume);

        osc1.start(time);
        osc2.start(time);
        
        osc1.stop(time + duration);
        osc2.stop(time + duration);
      }

      // 5. Ambient Chord Pad (Chords wash)
      playPad(chordFreqs, time, duration) {
        if (!this.ctx || this.isMuted) return;

        chordFreqs.forEach(freq => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          const filter = this.ctx.createBiquadFilter();

          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, time);

          filter.type = 'lowpass';
          filter.frequency.value = 500;

          gain.gain.setValueAtTime(0, time);
          gain.gain.linearRampToValueAtTime(0.1, time + 0.5); // slow attack
          gain.gain.setValueAtTime(0.1, time + duration - 0.5);
          gain.gain.linearRampToValueAtTime(0, time + duration);

          osc.connect(filter);
          filter.connect(gain);
          gain.connect(this.masterVolume);

          osc.start(time);
          osc.stop(time + duration);
        });
      }

      // 6. retro lead synthesizer (Melody on Top)
      playLead(freq, time, duration) {
        if (!this.ctx || this.isMuted) return;

        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator(); // Detuned saw for fat chorus
        const gain = this.ctx.createGain();
        const filter = this.ctx.createBiquadFilter();

        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(freq, time);

        osc2.type = 'sawtooth';
        osc2.frequency.setValueAtTime(freq + 2, time); // 2Hz detuning

        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(750, time);
        filter.frequency.exponentialRampToValueAtTime(2200, time + 0.04);
        filter.frequency.exponentialRampToValueAtTime(550, time + duration);

        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(0.08, time + 0.02); // Fast attack
        gain.gain.exponentialRampToValueAtTime(0.035, time + duration - 0.02); // Decay-sustain
        gain.gain.exponentialRampToValueAtTime(0.001, time + duration); // Release

        osc1.connect(filter);
        
        // Soft volume mix for saw detune
        const sawMix = this.ctx.createGain();
        sawMix.gain.setValueAtTime(0.12, time);
        osc2.connect(sawMix);
        sawMix.connect(filter);

        filter.connect(gain);
        gain.connect(this.masterVolume);

        osc1.start(time);
        osc2.start(time);
        osc1.stop(time + duration);
        osc2.stop(time + duration);
      }

      // 7. Advanced 8-Bit Eating SFX Tiers
      playEatSFX(type) {
        this.init();
        if (!this.ctx || this.isMuted) return;

        const now = this.ctx.currentTime;

        if (type === 0) {
          // Common: classic upwards pitch sweep
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(440, now);
          osc.frequency.exponentialRampToValueAtTime(880, now + 0.12);
          
          gain.gain.setValueAtTime(0.55, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
          
          osc.connect(gain);
          gain.connect(this.masterVolume);
          osc.start(now);
          osc.stop(now + 0.13);
        } 
        else if (type === 1) {
          // Rare: 8-bit double ping arpeggio
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'square'; // Chunky vintage bite
          osc.frequency.setValueAtTime(523.25, now); // C5
          osc.frequency.setValueAtTime(659.25, now + 0.06); // E5
          
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
          
          osc.connect(gain);
          gain.connect(this.masterVolume);
          osc.start(now);
          osc.stop(now + 0.16);
        } 
        else {
          // Exclusive: Epic major arpeggio synth chord sweep!
          const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6 (C Major chord sweep)
          notes.forEach((freq, idx) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            const filter = this.ctx.createBiquadFilter();
            
            osc.type = 'sawtooth';
            filter.type = 'lowpass';
            filter.frequency.value = 1400;

            const startTime = now + idx * 0.04;
            osc.frequency.setValueAtTime(freq, startTime);
            gain.gain.setValueAtTime(0, now);
            gain.gain.setValueAtTime(0.25, startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.18);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(this.masterVolume);
            
            osc.start(startTime);
            osc.stop(startTime + 0.20);
          });
        }
      }

      // --- SEQUENCER CLOCK ---
      scheduler() {
        if (!this.isPlayingMusic) return;

        while (this.nextNoteTime < this.ctx.currentTime + this.scheduleAheadTime) {
          this.scheduleNextStep(this.currentStep, this.nextNoteTime);
          this.advanceStep();
        }
        
        this.schedulerTimerId = setTimeout(() => this.scheduler(), this.lookahead);
      }

      advanceStep() {
        const secondsPerBeat = 60.0 / this.tempo;
        const secondsPerStep = secondsPerBeat / 4; // 16th notes
        this.nextNoteTime += secondsPerStep;

        this.currentStep = (this.currentStep + 1) % 16;
        this.globalStep = (this.globalStep + 1) % 64; // Melody loops every 4 measures (64 steps)
      }

      scheduleNextStep(step, time) {
        // Frequencies: A minor -> F major -> G major -> E minor
        const scale = {
          A: 110.00,  // A2
          F: 87.31,   // F2
          G: 98.00,   // G2
          E: 82.41    // E2
        };

        const chordPads = {
          Am: [220, 261.63, 329.63], // A3, C4, E4
          F:  [174.61, 220, 261.63],
          G:  [196, 246.94, 293.66],
          Em: [164.81, 196, 246.94]
        };

        let activeRoot = scale.A;
        let activePad = chordPads.Am;

        // Shift root scale chord loop every measure (16 steps)
        const currentMeasure = Math.floor(this.globalStep / 16);
        if (currentMeasure === 0) {
          activeRoot = scale.A;
          activePad = chordPads.Am;
        } else if (currentMeasure === 1) {
          activeRoot = scale.F;
          activePad = chordPads.F;
        } else if (currentMeasure === 2) {
          activeRoot = scale.G;
          activePad = chordPads.G;
        } else {
          activeRoot = scale.E;
          activePad = chordPads.Em;
        }

        const stepDuration = (60.0 / this.tempo) / 4;

        // --- 1. SYNCAPATED DRIVING BASSLINE ---
        // A highly rhythmic, driving off-beat syncopation gallop pattern
        const bassRhythm = [0, 2, 3, 4, 6, 8, 10, 11, 12, 14];
        if (bassRhythm.includes(step)) {
          const isOctave = (step === 3 || step === 11);
          const freq = isOctave ? activeRoot * 2 : activeRoot;
          this.playBass(freq, time, stepDuration * 0.95);
        }

        // --- 2. DRIVING DRUMS TRACK ---
        // Syncopated Kick Drum: Beats 1, 1-and-a-half (offbeat syncopation), 3, 3-and-a-half
        if (step === 0 || step === 3 || step === 8 || step === 11) {
          this.playKick(time);
        }
        
        // Snare on Beats 2 & 4 (Steps 4 and 12)
        if (step === 4 || step === 12) {
          this.playSnare(time);
        }

        // Hi-Hat ticks on offbeats to provide acceleration feel
        if (step === 2 || step === 6 || step === 10 || step === 14) {
          this.playHihat(time);
        }

        // --- 3. AMBIENT CHORD WASH ---
        if (step === 0) {
          const chordDuration = (60.0 / this.tempo) * 4; // 1 whole measure
          this.playPad(activePad, time, chordDuration * 0.98);
        }

        // --- 4. RETRO LEAD MELODY ---
        // A catchy, syncopated 80s lead hooks sequence (64 steps loop)
        const melody = [
          // Bar 1 (A Minor hook)
          659.25, 0, 0, 783.99, 0, 880.00, 0, 0, 659.25, 0, 587.33, 0, 659.25, 0, 0, 0,
          // Bar 2 (Shifting up to high C octave)
          659.25, 0, 0, 783.99, 0, 880.00, 0, 0, 1046.50, 0, 987.77, 0, 880.00, 0, 0, 0,
          // Bar 3 (F major hook)
          587.33, 0, 0, 698.46, 0, 783.99, 0, 0, 587.33, 0, 523.25, 0, 587.33, 0, 0, 0,
          // Bar 4 (G major resolving to Em/Am)
          659.25, 0, 587.33, 0, 523.25, 0, 0, 0, 493.88, 0, 440.00, 0, 493.88, 0, 440.00, 0
        ];

        const targetFreq = melody[this.globalStep];
        if (targetFreq > 0) {
          // Play notes with slight legato overlay
          this.playLead(targetFreq, time, stepDuration * 1.8);
        }
      }
    }

    const audio = new SynthManager();

    // --- GAME ENGINE LOGIC ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI elements
    const scoreVal = document.getElementById('scoreVal');
    const highScoreVal = document.getElementById('highScoreVal');
    const finalScoreVal = document.getElementById('finalScoreVal');
    const bestAttemptVal = document.getElementById('bestAttemptVal');
    const audioToggle = document.getElementById('audioToggle');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    // Grid details
    const GRID_SIZE = 20; // 20x20 grid
    const CELL_COUNT = canvas.width / GRID_SIZE; // 30 pixels per cell

    // Game states
    let snake = [];
    let food = { x: 0, y: 0, type: 0, color: '#00ffff', scoreValue: 100, growthValue: 1, name: 'CYBER-PULSE' };
    
    // Direction vectors
    let dx = 1;
    let dy = 0;
    
    // Command input queue to guarantee rapid key entries aren't lost
    let inputQueue = [];

    let score = 0;
    let highScore = localStorage.getItem('snake_highscore') || 0;
    let gameLoopInterval = null;
    let baseSpeed = 135; // Milliseconds per tick
    let currentSpeed = baseSpeed;
    let gameActive = false;
    
    // Segment growth accumulation
    let pendingGrowth = 0;

    // Visual particles and toasts
    let particles = [];
    let alertText = "";
    let alertTimer = 0;

    // Set initial High Score display
    highScoreVal.textContent = String(highScore).padStart(4, '0');

    // Initialize/Spawn Snake in center
    function spawnSnake() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      dx = 1;
      dy = 0;
      inputQueue = [];
      pendingGrowth = 0;
    }

    // Spawns retro food item ensuring it doesn't overlap the snake
    function spawnFood() {
      let overlap = true;
      let rx, ry;
      
      while (overlap) {
        overlap = false;
        rx = Math.floor(Math.random() * CELL_COUNT);
        ry = Math.floor(Math.random() * CELL_COUNT);
        
        for (let i = 0; i < snake.length; i++) {
          if (snake[i].x === rx && snake[i].y === ry) {
            overlap = true;
            break;
          }
        }
      }

      // Choose Food Type based on probability distribution
      // 70% Common (0.0 to 0.7)
      // 20% Rare (0.7 to 0.9)
      // 10% Exclusive (0.9 to 1.0)
      const randVal = Math.random();
      let type = 0;
      let color = '#00ffff';
      let scoreValue = 100;
      let growthValue = 1;
      let name = 'CYBER-PULSE';

      if (randVal >= 0.90) {
        type = 2; // Exclusive
        color = '#ff007f'; // Glowing pink
        scoreValue = 500;
        growthValue = 3; // Grows by 3 elements!
        name = 'PLASMA-CORE';
        
        alertText = "ALERT: PLASMA-CORE DETECTED (+500)";
        alertTimer = 75; // duration in ticks
      } else if (randVal >= 0.70) {
        type = 1; // Rare
        color = '#ffe600'; // Glowing yellow
        scoreValue = 250;
        growthValue = 2; // Grows by 2 elements!
        name = 'WARNING: GOLD-GLITCH INBOUND (+250)';
        
        alertText = "WARNING: GOLD-GLITCH LOCATED (+250)";
        alertTimer = 75;
      }

      food = {
        x: rx,
        y: ry,
        type: type,
        color: color,
        scoreValue: scoreValue,
        growthValue: growthValue,
        name: name
      };
    }

    // Particle Explosion for consumption impact
    class Particle {
      constructor(x, y, color, speedMult = 1.0) {
        this.x = x * GRID_SIZE + GRID_SIZE / 2;
        this.y = y * GRID_SIZE + GRID_SIZE / 2;
        this.color = color;
        this.radius = Math.random() * 3 + 1;
        const angle = Math.random() * Math.PI * 2;
        const speed = (Math.random() * 4.5 + 2) * speedMult;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.alpha = 1.0;
        this.decay = Math.random() * 0.035 + 0.02; // Slower fade for dramatic effects
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 12;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }
    }

    function createExplosion(x, y, color, count) {
      // Speed up particles depending on rarity
      const speedMultiplier = food.type === 0 ? 1.0 : food.type === 1 ? 1.35 : 1.8;
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color, speedMultiplier));
      }
    }

    // --- GAME RENDERING PIPELINE ---
    let frameCount = 0;
    
    function drawGame() {
      // 1. Screen Refresh - Ghosting trail
      ctx.fillStyle = 'rgba(13, 2, 17, 0.28)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 2. Draw Retro Glowing Grid lines
      ctx.strokeStyle = 'rgba(189, 0, 255, 0.06)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= CELL_COUNT; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID_SIZE, 0);
        ctx.lineTo(i * GRID_SIZE, canvas.height);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(0, i * GRID_SIZE);
        ctx.lineTo(canvas.width, i * GRID_SIZE);
        ctx.stroke();
      }

      // 3. Draw explosion particles
      particles = particles.filter(p => p.alpha > 0);
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      // 4. Draw Snake
      snake.forEach((segment, index) => {
        const isHead = index === 0;
        const sizeMultiplier = isHead ? 1.0 : Math.max(0.65, 1.0 - (index / snake.length) * 0.35); // Tapered body
        const size = GRID_SIZE * sizeMultiplier;
        const offset = (GRID_SIZE - size) / 2;
        
        ctx.save();
        
        if (isHead) {
          ctx.fillStyle = '#ff007f'; // Neon pink head
          ctx.shadowBlur = 15;
          ctx.shadowColor = '#ff007f';
        } else {
          // Shifting purple/magenta gradient
          ctx.fillStyle = `hsl(${290 + (index * 3) % 40}, 100%, 50%)`;
          ctx.shadowBlur = 8;
          ctx.shadowColor = '#bd00ff';
        }

        const x = segment.x * GRID_SIZE + offset;
        const y = segment.y * GRID_SIZE + offset;
        
        ctx.beginPath();
        ctx.roundRect(x, y, size, size, isHead ? 6 : 4);
        ctx.fill();

        // Glowing yellow eyes facing heading
        if (isHead) {
          ctx.fillStyle = '#ffe600';
          ctx.shadowBlur = 5;
          ctx.shadowColor = '#ffe600';
          
          let eyeSize = 3;
          let eyeOffset = 6;
          
          if (dx === 1) {
            ctx.fillRect(x + size - 8, y + eyeOffset, eyeSize, eyeSize);
            ctx.fillRect(x + size - 8, y + size - eyeOffset - eyeSize, eyeSize, eyeSize);
          } else if (dx === -1) {
            ctx.fillRect(x + 5, y + eyeOffset, eyeSize, eyeSize);
            ctx.fillRect(x + 5, y + size - eyeOffset - eyeSize, eyeSize, eyeSize);
          } else if (dy === 1) {
            ctx.fillRect(x + eyeOffset, y + size - 8, eyeSize, eyeSize);
            ctx.fillRect(x + size - eyeOffset - eyeSize, y + size - 8, eyeSize, eyeSize);
          } else if (dy === -1) {
            ctx.fillRect(x + eyeOffset, y + 5, eyeSize, eyeSize);
            ctx.fillRect(x + size - eyeOffset - eyeSize, y + 5, eyeSize, eyeSize);
          }
        }
        
        ctx.restore();
      });

      // 5. Draw Food (Tier Specific Visual Styling)
      frameCount++;
      const pulse = 1.0 + Math.sin(frameCount * 0.16) * 0.15;
      const fSize = (GRID_SIZE - 6) * pulse;
      
      const fx = food.x * GRID_SIZE + GRID_SIZE / 2;
      const fy = food.y * GRID_SIZE + GRID_SIZE / 2;

      ctx.save();
      ctx.shadowBlur = 18 + Math.sin(frameCount * 0.15) * 4;
      ctx.shadowColor = food.color;
      ctx.fillStyle = food.color;

      if (food.type === 0) {
        // --- COMMON: Rotating Diamond ---
        ctx.translate(fx, fy);
        ctx.rotate(frameCount * 0.04);
        ctx.beginPath();
        ctx.moveTo(0, -fSize / 2);
        ctx.lineTo(fSize / 2, 0);
        ctx.lineTo(0, fSize / 2);
        ctx.lineTo(-fSize / 2, 0);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(0, 0, 2, 0, Math.PI * 2);
        ctx.fill();
      } 
      else if (food.type === 1) {
        // --- RARE: Pulsing Retro Target Star ---
        ctx.translate(fx, fy);
        ctx.rotate(-frameCount * 0.03);
        
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const angle = (i * Math.PI) / 4;
          const r = i % 2 === 0 ? fSize / 2 : fSize / 4;
          const sx = Math.cos(angle) * r;
          const sy = Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(sx, sy);
          else ctx.lineTo(sx, sy);
        }
        ctx.closePath();
        ctx.fill();

        // Glowing wire ring
        ctx.strokeStyle = food.color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, fSize / 1.7, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(0, 0, 3, 0, Math.PI * 2);
        ctx.fill();
      } 
      else {
        // --- EXCLUSIVE: High-Energy Pulsating Plasma Core ---
        ctx.translate(fx, fy);
        ctx.rotate(frameCount * 0.08);

        // Core
        ctx.beginPath();
        ctx.arc(0, 0, fSize / 3.5, 0, Math.PI * 2);
        ctx.fill();

        // Orbiting rings
        ctx.strokeStyle = food.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, fSize / 2, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, fSize / 1.4, 0, Math.PI * 2);
        ctx.stroke();

        // Sub-orbit satellites
        ctx.fillStyle = food.color;
        for (let i = 0; i < 4; i++) {
          const angle = (i * Math.PI) / 2 + frameCount * 0.05;
          const nx = Math.cos(angle) * (fSize / 1.4);
          const ny = Math.sin(angle) * (fSize / 1.4);
          ctx.beginPath();
          ctx.arc(nx, ny, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();

      // 6. Draw System Log Spawning Notifications
      if (alertTimer > 0) {
        alertTimer--;
        ctx.save();
        ctx.font = '8px "Press Start 2P"';
        ctx.fillStyle = food.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = food.color;
        ctx.textAlign = 'center';
        
        // Dynamic terminal glitch alpha fade
        if (alertTimer < 20) {
          ctx.globalAlpha = alertTimer / 20;
        } else {
          ctx.globalAlpha = 0.85 + Math.sin(frameCount * 0.4) * 0.15;
        }
        
        ctx.fillText(alertText, canvas.width / 2, canvas.height - 32);
        ctx.restore();
      }
    }

    // --- GAME PHYSICS TICK ---
    function updatePhysics() {
      // 1. Process queued keyboard steering command (Prevents lost keystrokes)
      if (inputQueue.length > 0) {
        const nextMove = inputQueue.shift();
        dx = nextMove.dx;
        dy = nextMove.dy;
      }

      // 2. Compute next head coordinates
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      // 3. Wall Collision check
      if (head.x < 0 || head.x >= CELL_COUNT || head.y < 0 || head.y >= CELL_COUNT) {
        handleGameOver();
        return;
      }

      // 4. Tail Collision check
      for (let i = 0; i < snake.length; i++) {
        if (snake[i].x === head.x && snake[i].y === head.y) {
          handleGameOver();
          return;
        }
      }

      // 5. Place head
      snake.unshift(head);

      // 6. Eating check
      if (head.x === food.x && head.y === food.y) {
        // Play specific SFX Tier
        audio.playEatSFX(food.type);
        
        // Massive custom explosion particle burst
        const particleCount = food.type === 0 ? 12 : food.type === 1 ? 25 : 45;
        createExplosion(food.x, food.y, food.color, particleCount);
        
        // Increment Score
        score += food.scoreValue;
        scoreVal.textContent = String(score).padStart(4, '0');
        
        // High Score
        if (score > highScore) {
          highScore = score;
          highScoreVal.textContent = String(highScore).padStart(4, '0');
          localStorage.setItem('snake_highscore', highScore);
        }

        // Setup multi-segment pending growth ticks
        pendingGrowth += food.growthValue;

        spawnFood();

        // Speed ramp scaling
        const speedReduction = Math.floor(score / 100) * 1.5;
        currentSpeed = Math.max(55, baseSpeed - speedReduction);
        
        clearInterval(gameLoopInterval);
        gameLoopInterval = setInterval(gameStep, currentSpeed);
      } else {
        // Process standard segment growth decay ticks
        if (pendingGrowth > 0) {
          pendingGrowth--;
        } else {
          snake.pop(); // Standard slide motion
        }
      }
    }

    // Unified step execution
    function gameStep() {
      updatePhysics();
      drawGame();
    }

    // --- INPUT PROCESSING (Input Queuing Keyboard Steering) ---
    document.addEventListener('keydown', e => {
      const arrows = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '];
      if (arrows.includes(e.key) && gameActive) {
        e.preventDefault();
      }

      if (!gameActive) return;

      // Extract last targeted move context (either tail of queue, or head active direction)
      const lastMove = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : { dx, dy };
      let newMove = null;

      switch(e.key.toLowerCase()) {
        case 'arrowup':
        case 'w':
          if (lastMove.dy !== 1) newMove = { dx: 0, dy: -1 };
          break;
        case 'arrowdown':
        case 's':
          if (lastMove.dy !== -1) newMove = { dx: 0, dy: 1 };
          break;
        case 'arrowleft':
        case 'a':
          if (lastMove.dx !== 1) newMove = { dx: -1, dy: 0 };
          break;
        case 'arrowright':
        case 'd':
          if (lastMove.dx !== -1) newMove = { dx: 1, dy: 0 };
          break;
      }

      if (newMove) {
        // Only queue up to 2 frames ahead to keep controls extremely snappy and responsive
        if (inputQueue.length < 2) {
          inputQueue.push(newMove);
        }
      }
    });

    // --- GAME CONTROL SYSTEM ---
    function initializeGame() {
      score = 0;
      currentSpeed = baseSpeed;
      scoreVal.textContent = '0000';
      particles = [];
      alertTimer = 0;
      alertText = "";

      spawnSnake();
      spawnFood();
      
      audio.startMusic();
      
      gameActive = true;
      drawGame();
      
      if (gameLoopInterval) clearInterval(gameLoopInterval);
      gameLoopInterval = setInterval(gameStep, currentSpeed);
    }

    function handleGameOver() {
      gameActive = false;
      clearInterval(gameLoopInterval);
      
      // Stop sequencer
      audio.stopMusic();

      // Set score stats
      finalScoreVal.textContent = String(score).padStart(4, '0');
      bestAttemptVal.textContent = String(highScore).padStart(4, '0');
      
      gameOverScreen.classList.remove('hidden');
    }

    // --- BUTTON EVENT LISTENERS ---

    startBtn.addEventListener('click', () => {
      startScreen.classList.add('hidden');
      initializeGame();
    });

    restartBtn.addEventListener('click', () => {
      gameOverScreen.classList.add('hidden');
      initializeGame();
    });

    let audioState = true;
    audioToggle.addEventListener('click', () => {
      audioState = !audioState;
      if (audioState) {
        audioToggle.textContent = 'MUSIC: ON';
        audioToggle.classList.remove('muted');
        audio.setMute(false);
        if (gameActive) {
          audio.startMusic();
        }
      } else {
        audioToggle.textContent = 'MUSIC: OFF';
        audioToggle.classList.add('muted');
        audio.setMute(true);
      }
    });

    window.onload = () => {
      drawGame();
    };
  </script>
</body>
</html>
